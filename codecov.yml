# codecov.yml — coverage thresholds for mixhazard
#
# Releases are held to a hard floor; development branches report only.
# The 50% floor reflects the current sparse test suite. Raise it incrementally
# as test coverage expands.

coverage:
  status:
    project:
      default:
        # Minimum acceptable coverage across the whole package
        target: 50%
        threshold: 2%        # allow a 2 pp slip before marking CI red
        # Only enforce on the main (release) branch
        if_not_found: success
        if_ci_failed: error
        branches:
          - main
    patch:
      default:
        # New code in each PR should be at least 50% covered
        target: 50%
        threshold: 5%
        if_not_found: success
        if_ci_failed: error

# Never block CI purely because codecov itself is down or the token is missing
comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
